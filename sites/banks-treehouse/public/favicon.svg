<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Forest green background -->
  <rect width="512" height="512" rx="80" fill="#225739"/>
  <!-- Elevated cabin body — large, cream -->
  <rect x="130" y="230" width="252" height="160" rx="12" fill="#FCF9F3"/>
  <!-- Bold triangular roof — warm amber -->
  <polygon points="100,240 256,100 412,240" fill="#C17A37"/>
  <!-- Single large window — green cutout for contrast -->
  <rect x="216" y="270" width="80" height="70" rx="8" fill="#225739"/>
  <!-- Stilts — two simple legs to suggest "elevated/treehouse" -->
  <rect x="175" y="390" width="24" height="80" rx="4" fill="#C17A37"/>
  <rect x="313" y="390" width="24" height="80" rx="4" fill="#C17A37"/>
</svg>
